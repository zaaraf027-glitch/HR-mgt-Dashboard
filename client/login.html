<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus HR - Sign In</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <div class="brand-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2"></rect>
                    <path d="M9 22V18h6v4"></path>
                    <path d="M8 6h2"></path>
                    <path d="M14 6h2"></path>
                    <path d="M8 10h2"></path>
                    <path d="M14 10h2"></path>
                    <path d="M8 14h2"></path>
                    <path d="M14 14h2"></path>
                </svg>
            </div>
            <h1>Nexus HR</h1>
            <p>Enterprise Employee Management System</p>
        </div>

        <div class="login-card">
            <h2 id="cardTitle">Welcome Back</h2>
            <p id="cardSubtitle">Please enter your details to sign in</p>

            <form id="loginForm">
                <!-- Full Name (Only visible for Sign Up) -->
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label class="form-label" for="fullname">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="fullname" placeholder="Elena Rodriguez">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" placeholder="m.smith@nexus-enterprise.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        Password
                        <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
                    </label>
                    <div class="input-wrapper">
                        <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group" id="rememberGroup">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">Remember me for 30 days</label>
                </div>

                <button type="submit" class="btn-primary" id="signInBtn">Sign In</button>

                <div class="sso-divider" id="ssoDivider">Or continue with SSO</div>

                <div class="sso-buttons" id="ssoButtons">
                    <button type="button" class="btn-sso" onclick="handleSSO('Google')">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.565 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0 7.565 0 3.515 2.7 1.545 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
                        Google
                    </button>
                    <button type="button" class="btn-sso" onclick="handleSSO('Azure AD')">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                        </svg>
                        Azure AD
                    </button>
                </div>

                <!-- Prominent Toggle Link Inside Card -->
                <div class="auth-toggle-container" style="text-align: center; margin-top: 24px; font-size: 0.9rem;">
                    <span id="toggleText">Don't have an account?</span> <a href="#" id="toggleAuthMode" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign Up</a>
                </div>
            </form>
        </div>

        <div class="login-footer">
            <div class="links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Support</a>
            </div>
        </div>

    </div>

    <script src="./js/login.js"></script>
</body>
</html>
